<svg
  width="100"
  height="100"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="gold-gradient-svg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#DFBA6B" />
      <stop offset="25%" stopColor="#F9E4B7" />
      <stop offset="50%" stopColor="#D4AF37" />
      <stop offset="75%" stopColor="#A67C1E" />
      <stop offset="100%" stopColor="#DFBA6B" />
    </linearGradient>
  </defs>

  {/* Crown Base Curve */}
  <path
    d="M 28 34 C 40 37, 60 37, 72 34 L 70 37 L 30 37 Z"
    fill="url(#gold-gradient-svg)"
  />
  {/* Crown Spikes */}
  <path
    d="M 28 34 L 20 15 L 36 24 L 50 4 L 64 24 L 80 15 L 72 34 Z"
    fill="url(#gold-gradient-svg)"
  />
  {/* Star/Sparkle atop central spike */}
  <path
    d="M 50 -3 L 52 1 L 56 1 L 53 3 L 54 7 L 50 5 L 46 7 L 47 3 L 44 1 L 48 1 Z"
    fill="url(#gold-gradient-svg)"
  />
  {/* Decorative beads on the tips of spikes */}
  <circle cx="20" cy="15" r="1.5" fill="url(#gold-gradient-svg)" />
  <circle cx="80" cy="15" r="1.5" fill="url(#gold-gradient-svg)" />
  <circle cx="36" cy="24" r="1.2" fill="url(#gold-gradient-svg)" />
  <circle cx="64" cy="24" r="1.2" fill="url(#gold-gradient-svg)" />

  {/* Stylized Serif "M" */}
  <text
    x="50%"
    y="88"
    textAnchor="middle"
    fontFamily="Cinzel, Playfair Display, Georgia, serif"
    fontSize="56"
    fontWeight="800"
    fill="url(#gold-gradient-svg)"
    letterSpacing="-0.02em"
  >
    M
  </text>
</svg>
